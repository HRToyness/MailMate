name: MailMate
options:
  bundleIdPrefix: com.toynessit
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
targets:
  MailMate:
    type: application
    platform: macOS
    sources:
      - path: MailMate
        excludes:
          - "Info.plist"
          - "MailMate.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toynessit.MailMate
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MailMate/Info.plist
        CODE_SIGN_ENTITLEMENTS: MailMate/MailMate.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        PRODUCT_NAME: MailMate
